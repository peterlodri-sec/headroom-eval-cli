   version: "3"
   tasks:
     fix-import:
       cmds: [python3 fix_import.py]
     push:
       cmds: [git add -A, git commit -m update || true, git push]
     ship:
       cmds: [{task: fix-import}, {task: push}]
     status:
       cmds: [curl -s https://huggingface.co/api/spaces/PeetPedro/headroom-eval | python3
  status.py]
     dev:
       cmds: [{task: fix-import}, pip install -q -r requirements.txt, python app.py]
